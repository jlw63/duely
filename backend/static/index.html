<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2312131e'/><polygon points='20,30 47,50 20,70' fill='%2300c8ee'/><polygon points='80,30 53,50 80,70' fill='%23ff6259'/></svg>">
<title>duely</title>

<style>
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #12131e;
    color: #f2f3f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 12vh;
    margin: 0;
  }

  /* --- brand header --- */
  #logo {
    display: flex;
    align-items: center;
    gap: 1rem;
    user-select: none;
  }
  #logo svg {
    width: 1.6rem;
    height: 1.6rem;
  }
  #wordmark {
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  #slogan {
    color: #8b8fa8;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 0.75rem;
    margin: 0.75rem 0 3rem;
  }

  /* --- screens: only one of #lobby / #game shows at a time --- */
  #lobby {
    display: flex;
    gap: 0.6rem;
  }
  #game {
    display: none;           /* JS flips this to flex on join */
    flex-direction: column;
    align-items: center;
  }

  /* --- game --- */
  #question {
    font-size: 2.6rem;
    font-weight: 600;
    margin: 0 0 0.75rem;
    text-align: center;
  }
  #score {
    font-size: 1.1rem;
    color: #8b8fa8;
    font-variant-numeric: tabular-nums;
    margin-bottom: 2.5rem;
    min-height: 1.4rem;   /* holds the space before first result, so nothing jumps */
  }
  #controls {
    display: flex;
    gap: 0.6rem;
  }

  /* --- shared input/button styling --- */
  #answer, #room {
    font-size: 1.4rem;
    padding: 0.55rem 0.8rem;
    width: 9rem;
    text-align: center;
    background: #1c1e2e;
    color: #f2f3f7;
    border: 2px solid #2c2f45;
    border-radius: 10px;
  }
  #room {
    text-transform: uppercase;   /* room codes display as caps while you type */
  }
  #answer:focus, #room:focus {
    outline: none;
    border-color: #00c8ee;
  }
  #send, #join {
    font-size: 1.2rem;
    font-weight: 700;
    padding: 0.55rem 1.4rem;
    background: #ff6259;
    color: #12131e;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  #send:hover, #join:hover {
    background: #ff7b73;
  }
  #send:focus-visible, #join:focus-visible {
    outline: 2px solid #00c8ee;
    outline-offset: 2px;
  }
</style>

<div id="logo">
  <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="10,10 90,50 10,90" fill="#00c8ee"/></svg>
  <div id="wordmark">duely</div>
  <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="90,10 10,50 90,90" fill="#ff6259"/></svg>
</div>
<p id="slogan">answer first. win the duel.</p>

<!-- screen 1: the lobby -->
<div id="lobby">
  <input id="room" type="text" placeholder="room code" maxlength="12" autofocus>
  <button id="join">duel</button>
</div>

<!-- screen 2: the game (hidden until a room is joined) -->
<div id="game">
  <div id="question">waiting for opponent...</div>
  <div id="score"></div>
  <div id="controls">
    <input id="answer" type="number" placeholder="answer">
    <button id="send">go</button>
  </div>
</div>

<script>

    let ws = null;    // no connection yet — born when a room is joined
    let me = null;

function joinRoom() {
    const room = document.getElementById("room").value.trim().toUpperCase() || "DUEL";

    let proto = "ws:";
    if (location.protocol === "https:") {
        proto = "wss:";
    }
    ws = new WebSocket(proto + "//" + location.host + "/ws/" + room);

ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    console.log("got:", msg);
    if (msg.type === "question") {
        document.getElementById("question").textContent = msg.text;
    }
    if (msg.type === "result") {
        document.getElementById("score").textContent = "player1: " + msg.scores.player1 + " - player2: " + msg.scores.player2;
    }
    if(msg.type === "game_over") {
        if (msg.winner === me) {
            document.getElementById("question").textContent = "you won the game!";
        } else {
            document.getElementById("question").textContent = "you lost the game!";
        }
    }
    if (msg.type === "opponent_left") {
        document.getElementById("question").textContent = "opponent left the game";
    }
    if (msg.type === "welcome") {
        me = msg.name;
    }
};

    // swap screens: lobby out, game in
    document.getElementById("lobby").style.display = "none";
    document.getElementById("game").style.display = "flex";
    document.getElementById("answer").focus();
}

function sendAnswer() {
  const box = document.getElementById("answer");
  ws.send(JSON.stringify({ type: "answer", value: Number(box.value) }));
  box.value = "";   // empty the box for the next round
}

document.getElementById("join").onclick = joinRoom;
document.getElementById("room").addEventListener("keydown", (e) => {
  if (e.key === "Enter") joinRoom();
});

document.getElementById("send").onclick = sendAnswer;
document.getElementById("answer").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendAnswer();
});

</script>
