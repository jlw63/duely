<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2312131e'/><polygon points='16,26 50,50 16,74' fill='%2300b0ff'/><polygon points='84,26 50,50 84,74' fill='%23ff5252'/></svg>">
<title>duely</title>
<meta property="og:title" content="duely — answer first. win the duel.">
<meta property="og:description" content="1v1 mental math. Fastest correct answer takes the round, first to 5 wins. Free, no signup.">
<meta property="og:image" content="https://duely-epn0.onrender.com/banner.png">
<meta name="twitter:card" content="summary_large_image">

<style>
  :root {
    --ink: #12131e;
    --panel: #1c1e2e;
    --edge: #2c2f45;
    --text: #f2f3f7;
    --dim: #8b8fa8;
    --soft: #aab0c8;     /* small text needs MORE contrast, not less */
    --blue: #00b0ff;
    --red: #ff5252;
  }

  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--ink);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;      /* hero sits at the visual center, not the top third */
    min-height: 100vh;
    padding: 2rem 1rem;
    margin: 0;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  /* --- ambient background triangles, drifting toward the face-off --- */
  .bg-tri {
    position: fixed;
    top: 50%;
    width: 42vh;
    height: 60vh;
    opacity: 0.09;
    pointer-events: none;
    z-index: -1;
    transform: translateY(-50%);
  }
  .bg-tri.left  { left: -6vh;  animation: drift-l 6s ease-in-out infinite alternate; }
  .bg-tri.right { right: -6vh; animation: drift-r 6s ease-in-out infinite alternate; }
  @keyframes drift-l { to { transform: translateY(-50%) translateX(2.5vh); } }
  @keyframes drift-r { to { transform: translateY(-50%) translateX(-2.5vh); } }

  @media (prefers-reduced-motion: reduce) {
    .bg-tri.left, .bg-tri.right { animation: none; }
    #logo svg { animation: none; }
    #game { animation: none; }
    button { transition: none; }
  }

  /* --- brand header --- */
  #logo {
    display: flex;
    align-items: center;
    gap: 1rem;
    user-select: none;
  }
  #logo svg {
    width: 1.5rem;
    height: 1.5rem;
  }
  /* the face-off: arrows ease toward each other once, on load */
  #logo svg:first-of-type { animation: enter-l 0.6s ease-out; }
  #logo svg:last-of-type  { animation: enter-r 0.6s ease-out; }
  @keyframes enter-l { from { transform: translateX(-14px); opacity: 0; } }
  @keyframes enter-r { from { transform: translateX(14px);  opacity: 0; } }
  #wordmark {
    font-size: clamp(2.4rem, 8vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  #slogan {
    color: var(--dim);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 0.72rem;
    margin: 0.8rem 0 0.6rem;
    text-align: center;
  }
  #tagline {
    color: #c9cee2;     /* a step below white — the logo stays the loudest thing */
    font-size: 1.02rem;
    font-weight: 500;   /* medium weight ties it to the display type instead of reading as default */
    margin: 0 0 2.6rem;
    text-align: center;
  }

  /* --- screens: only one of #lobby / #game shows at a time --- */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
  }
  #create {
    font-size: 1.35rem;
    padding: 0.8rem 2.4rem;
  }
  .divider {
    color: var(--soft);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0.2rem 0 0;
  }

  /* input + button fused into one pill group */
  .pill-group {
    display: flex;
  }
  .pill-group input {
    border-radius: 10px 0 0 10px;
    border-right: none;
    width: 10rem;
  }
  .pill-group button {
    border-radius: 0 10px 10px 0;
    background: var(--blue);        /* join is the blue player's move; create is the red one's */
    color: var(--ink);
    border: 2px solid var(--blue);
    border-left: none;
    font-size: 1rem;
  }
  .pill-group button:hover { background: #33c1ff; }
  .pill-group:focus-within input,
  .pill-group:focus-within button { border-color: var(--blue); }

  .trust {
    color: var(--soft);
    font-size: 0.8rem;
    margin: -0.5rem 0 0.3rem;   /* snug under the create button — it de-risks that click */
  }

  /* --- mock round: proof of gameplay, no interaction --- */
  #demo {
    margin-top: 1.5rem;
    background: var(--panel);
    border: 1px solid var(--edge);
    border-radius: 14px;
    padding: 0.9rem 1.6rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
  }
  .demo-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .demo-q {
    font-size: 1.9rem;       /* the math is the fun part — second-loudest after the wordmark */
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .demo-row {
    display: flex;
    gap: 0.7rem;
    font-size: 0.82rem;
  }
  .demo-p {
    padding: 0.25rem 0.8rem;
    border-radius: 999px;
    border: 1px solid var(--edge);
  }
  .demo-p.win {
    border-color: rgba(0, 176, 255, 0.55);
    color: var(--blue);
    font-weight: 600;
  }
  .demo-p.lose {
    border-color: rgba(255, 82, 82, 0.4);   /* the duel is cyan vs coral, everywhere */
    color: var(--red);
  }

  #game {
    display: none;           /* JS flips this to flex on join */
    flex-direction: column;
    align-items: center;
    animation: rise 0.35s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  /* --- game screen --- */
  #meta {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .chip {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    background: var(--panel);
    border: 1px solid var(--edge);
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
  }
  button.chip {          /* the leave control: chip-shaped, but clearly clickable */
    font-family: inherit;
    font-weight: 600;
    color: var(--red);
    border-color: rgba(255, 82, 82, 0.4);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  button.chip:hover {
    border-color: var(--red);
    background: rgba(255, 82, 82, 0.1);
  }
  #again {
    display: none;           /* appears when a game ends */
    margin-top: 1.8rem;
    background: var(--panel);
    color: var(--text);
    border: 2px solid var(--edge);
    font-size: 1rem;
  }
  #again:hover {
    background: var(--panel);
    border-color: var(--blue);
  }
  #question {
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 600;
    margin: 0 0 0.75rem;
    text-align: center;
  }
  #score {
    font-size: 1.1rem;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    margin-bottom: 2.5rem;
    min-height: 1.4rem;   /* holds the space before first result, so nothing jumps */
  }
  #controls {
    display: flex;
    gap: 0.6rem;
  }

  /* --- shared input/button styling --- */
  input {
    font-size: 1.4rem;
    font-family: inherit;
    padding: 0.55rem 0.8rem;
    width: 11rem;
    text-align: center;
    background: var(--panel);
    color: var(--text);
    border: 2px solid var(--edge);
    border-radius: 10px;
    box-sizing: border-box;
  }
  input::placeholder {
    color: var(--dim);
    font-size: 1rem;
    letter-spacing: 0.08em;
  }
  #room { text-transform: uppercase; }
  input:focus {
    outline: none;
    border-color: var(--blue);
  }
  #answer::-webkit-inner-spin-button,
  #answer::-webkit-outer-spin-button { -webkit-appearance: none; }
  #answer { -moz-appearance: textfield; appearance: textfield; }

  button {
    font-size: 1.2rem;
    font-weight: 700;
    font-family: inherit;
    padding: 0.55rem 1.4rem;
    background: var(--red);
    color: var(--ink);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.08s;
  }
  button:hover { background: #ff6b6b; }
  button:active { transform: scale(0.96); }
  button:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
  }
</style>

<svg class="bg-tri left" viewBox="0 0 100 140" aria-hidden="true"><polygon points="0,0 100,70 0,140" fill="#00b0ff"/></svg>
<svg class="bg-tri right" viewBox="0 0 100 140" aria-hidden="true"><polygon points="100,0 0,70 100,140" fill="#ff5252"/></svg>

<div id="logo">
  <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="10,10 90,50 10,90" fill="#00b0ff"/></svg>
  <div id="wordmark">duely</div>
  <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="90,10 10,50 90,90" fill="#ff5252"/></svg>
</div>
<p id="slogan">answer first. win the duel.</p>
<p id="tagline">1v1 mental math — fastest correct answer takes the round, first to 5 wins.</p>

<!-- screen 1: the lobby -->
<div id="lobby">
  <button id="create">create a duel</button>
  <p class="trust">free · no signup · 2-minute matches</p>
  <p class="divider">have a code?</p>
  <div class="pill-group">
    <input id="room" type="text" placeholder="room code" maxlength="12">
    <button id="join">join</button>
  </div>

  <div id="demo" aria-hidden="true">
    <span class="demo-label">last round</span>
    <div class="demo-q">17 + 26</div>
    <div class="demo-row">
      <span class="demo-p win">you &#9656; 43 &#10003;</span>
      <span class="demo-p lose">them &#9656; too slow</span>
    </div>
  </div>
</div>

<!-- screen 2: the game (hidden until a room is joined) -->
<div id="game">
  <div id="meta">
    <span class="chip" id="room-chip"></span>
    <span class="chip" id="me-chip">connecting...</span>
    <button class="chip" id="leave">&#8592; leave</button>
  </div>
  <div id="question">waiting for opponent...</div>
  <div id="score"></div>
  <div id="controls">
    <input id="answer" type="number" placeholder="answer">
    <button id="send">go</button>
  </div>
  <button id="again">back to lobby</button>
</div>

<script>

    let ws = null;    // no connection yet — born when a room is joined
    let me = null;
    let leaving = false;   // true while WE chose to close, so onclose stays quiet

function joinRoom(room) {
    let proto = "ws:";
    if (location.protocol === "https:") {
        proto = "wss:";
    }
    leaving = false;
    ws = new WebSocket(proto + "//" + location.host + "/ws/" + room);

    // the connection died and it wasn't us: say so, offer the exit
    ws.onclose = () => {
        if (!leaving) {
            document.getElementById("question").textContent = "connection lost";
            document.getElementById("again").style.display = "inline-block";
        }
    };

ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    console.log("got:", msg);
    if (msg.type === "question") {
        document.getElementById("question").textContent = msg.text;
    }
    if (msg.type === "result") {
        document.getElementById("score").textContent = "player1: " + msg.scores.player1 + " - player2: " + msg.scores.player2;
    }
    if(msg.type === "game_over") {
        if (msg.winner === me) {
            document.getElementById("question").textContent = "you won the game!";
        } else {
            document.getElementById("question").textContent = "you lost the game!";
        }
        document.getElementById("again").style.display = "inline-block";
    }
    if (msg.type === "opponent_left") {
        document.getElementById("question").textContent = "opponent left the game";
        document.getElementById("again").style.display = "inline-block";
    }
    if (msg.type === "welcome") {
        me = msg.name;
        document.getElementById("me-chip").textContent = "you are " + me;
    }
};

    // swap screens: lobby out, game in
    document.getElementById("room-chip").textContent = "room: " + room;
    document.getElementById("lobby").style.display = "none";
    document.getElementById("game").style.display = "flex";
    document.getElementById("answer").focus();
}

function createDuel() {
    // mint a shareable 4-letter code; the backend accepts any room string
    const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";   // no I/O — they read as 1/0
    let code = "";
    for (let i = 0; i < 4; i++) {
        code += letters[Math.floor(Math.random() * letters.length)];
    }
    joinRoom(code);
}

function joinTyped() {
    const room = document.getElementById("room").value.trim().toUpperCase() || "DUEL";
    joinRoom(room);
}

function leaveRoom() {
    leaving = true;        // set BEFORE close(), so our own onclose stays quiet
    if (ws) ws.close();
    ws = null;
    me = null;
    // reset the game screen to its factory state for next time
    document.getElementById("question").textContent = "waiting for opponent...";
    document.getElementById("score").textContent = "";
    document.getElementById("me-chip").textContent = "connecting...";
    document.getElementById("answer").value = "";
    document.getElementById("again").style.display = "none";
    // swap screens back
    document.getElementById("game").style.display = "none";
    document.getElementById("lobby").style.display = "flex";
    document.getElementById("room").focus();
}

function sendAnswer() {
  if (!ws) return;   // no live connection, nothing to send
  const box = document.getElementById("answer");
  ws.send(JSON.stringify({ type: "answer", value: Number(box.value) }));
  box.value = "";   // empty the box for the next round
}

document.getElementById("leave").onclick = leaveRoom;
document.getElementById("again").onclick = leaveRoom;
document.getElementById("create").onclick = createDuel;
document.getElementById("join").onclick = joinTyped;
document.getElementById("room").addEventListener("keydown", (e) => {
  if (e.key === "Enter") joinTyped();
});

document.getElementById("send").onclick = sendAnswer;
document.getElementById("answer").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendAnswer();
});

</script>
