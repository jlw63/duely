<h1>Duely</h1>
<div id="question">waiting for opponent...</div>

<div id="score"></div>

<input id="answer" type="number" placeholder="your answer">
<button id="send">answer</button>


<script>
  const ws = new WebSocket("ws://localhost:8000/ws/DUEL");

ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    console.log("got:", msg);
    if (msg.type === "question") {
        document.getElementById("question").textContent = msg.text;
    }
    if (msg.type === "result") {
        document.getElementById("question").textContent = msg.winner + " wins the game!";
    }
    if(msg.type === "game_over") {
        document.getElementById("question").textContent = msg.text;
    }
    if (msg.type === "opponent_left") {
        document.getElementById("question").textContent = "opponent left the game";
    }
};

document.getElementById("send").onclick = () => {
  const box = document.getElementById("answer");
  ws.send(JSON.stringify({ type: "answer", value: Number(box.value) }));
  box.value = "";   // empty the box for the next round
};

</script>
