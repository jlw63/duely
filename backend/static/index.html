<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2312131e'/><polygon points='16,26 50,50 16,74' fill='%2300b0ff'/><polygon points='84,26 50,50 84,74' fill='%23ff5252'/></svg>">
<title>duely</title>
<meta property="og:title" content="duely — answer first. win the duel.">
<meta property="og:description" content="1v1 mental math. Fastest correct answer takes the round, first to 5 wins. Free, no signup.">
<meta property="og:image" content="https://duely-epn0.onrender.com/banner.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="/style.css">

<svg class="bg-tri left" viewBox="0 0 100 140" aria-hidden="true"><polygon points="0,0 100,70 0,140" fill="#00b0ff"/></svg>
<svg class="bg-tri right" viewBox="0 0 100 140" aria-hidden="true"><polygon points="100,0 0,70 100,140" fill="#ff5252"/></svg>

<div id="logo">
  <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="10,10 90,50 10,90" fill="#00b0ff"/></svg>
  <div id="wordmark">duely</div>
  <svg viewBox="0 0 100 100" aria-hidden="true"><polygon points="90,10 10,50 90,90" fill="#ff5252"/></svg>
</div>
<p id="slogan">answer first. win the duel.</p>
<p id="tagline">1v1 mental math — fastest correct answer takes the round, first to 5 wins.</p>

<!-- screen 1: the lobby -->
<div id="lobby">
  <button id="create">create a duel</button>
  <p class="trust">free · no signup · 2-minute matches</p>
  <p class="divider">have a code?</p>
  <div class="pill-group">
    <input id="room" type="text" placeholder="room code" maxlength="12">
    <button id="join">join</button>
  </div>

  <div id="demo" aria-hidden="true">
    <span class="demo-label">last round</span>
    <div class="demo-q">17 + 26</div>
    <div class="demo-row">
      <span class="demo-p win">you &#9656; 43 &#10003;</span>
      <span class="demo-p lose">them &#9656; too slow</span>
    </div>
  </div>
</div>

<!-- screen 2: the game (hidden until a room is joined) -->
<div id="game">
  <div id="meta">
    <span class="chip" id="room-chip"></span>
    <span class="chip" id="me-chip">connecting...</span>
    <button class="chip" id="leave">&#8592; leave</button>
  </div>
  <div id="wait">
    <span class="wait-label">your room code</span>
    <div id="invite-code"></div>
    <button id="copy">copy invite link</button>
    <div id="wait-anim" aria-hidden="true">
      <svg viewBox="0 0 100 100"><polygon points="10,10 90,50 10,90" fill="#00b0ff"/></svg>
      <svg viewBox="0 0 100 100"><polygon points="90,10 10,50 90,90" fill="#ff5252"/></svg>
    </div>
    <p id="wait-note">waiting for opponent…</p>
  </div>
  <div id="question">waiting for opponent...</div>
  <div id="pulse"><div></div></div>
  <div id="score">
    <div class="side you"><span class="side-label">you</span><div class="pips" id="my-pips"></div></div>
    <span class="vs">vs</span>
    <div class="side them"><div class="pips" id="their-pips"></div><span class="side-label">them</span></div>
  </div>
  <div id="fastest" class="stat-line" aria-live="polite"></div>
  <div id="controls">
    <input id="answer" type="number" inputmode="numeric" placeholder="answer">
    <button id="send">go</button>
  </div>
  <div id="postgame-status" class="postgame-status" aria-live="polite"></div>
  <div id="postgame-actions">
    <button id="rematch" class="primary">rematch</button>
    <button id="again" class="secondary">back to lobby</button>
  </div>
  <div id="celebration" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<script src="/app.js"></script>
